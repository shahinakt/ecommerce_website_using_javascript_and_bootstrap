<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- ═══════════════════════ Navbar ═══════════════════════ -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                ShopEase
            </a>

            <button
                class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#navbar"
                aria-controls="navbar"
                aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbar">

                <!-- Search (wired to applyFilters in script.js) -->
                <form class="d-flex mx-auto w-50" role="search" onsubmit="return false">
                    <input
                        class="form-control"
                        id="searchInput"
                        type="search"
                        placeholder="Search products, brands…"
                        aria-label="Search">
                </form>

                <!-- Cart Icon -->
                <a href="cart.html" class="btn position-relative ms-3" aria-label="Cart">
                    <i class="bi bi-cart3 fs-4"></i>
                    <span
                        id="cartCount"
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                        style="display:none">
                        0
                    </span>
                </a>

            </div>
        </div>
    </nav>


    <!-- ═══════════════════════ Filter Bar ═══════════════════ -->
    <section class="container mt-4">
        <div class="filter-bar">
            <div class="row g-3 align-items-center">

                <div class="col-lg-6">
                    <select id="categoryFilter" class="form-select" aria-label="Filter by category">
                        <option value="">All Categories</option>
                        <!-- Populated dynamically from products.json -->
                    </select>
                </div>

                <div class="col-lg-6">
                    <select id="priceSort" class="form-select" aria-label="Sort by price">
                        <option value="">Sort by Price</option>
                        <option value="low">Price: Low → High</option>
                        <option value="high">Price: High → Low</option>
                    </select>
                </div>

            </div>
        </div>
    </section>


    <!-- ═══════════════════════ Product Grid ═════════════════ -->
    <div class="container mt-4" id="productContainer">
        <!-- Populated dynamically by script.js -->
    </div>


    <!-- ═══════════════════════ Footer ═══════════════════════ -->
    <footer class="bg-dark text-white py-5">
        <div class="container text-center">
            <h5 class="mb-1">ShopEase</h5>
            <p class="mb-0 small text-secondary">© 2026 ShopEase. All Rights Reserved.</p>
        </div>
    </footer>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!--
        type="module" is required so that:
          1. ES import/export syntax works in script.js
          2. ProductCard.js is loaded as a module (NOT as a separate script tag)
        Module scripts are automatically deferred — no need for a separate defer attribute.
    -->
    <script type="module" src="assets/js/script.js"></script>

    <!--
        ✗ DO NOT add a separate <script src="ProductCard.js"> here.
          ProductCard.js is already imported inside script.js via:
          import { ProductCard } from "./components/ProductCard.js";
          Adding it again as a plain script would cause an export syntax error.
    -->

</body>

</html>
